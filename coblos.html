<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>coblos-calon-presiden</title>
    <link rel="shortcut icon" type="x-icon" href="coblos.png">
    <style>
      body {
        margin: 0;
        font-family: "Arial", sans-serif;
      }

    .navbar {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    background-color: cyan;
    color: black; /* Warna teks navbar saat ini */
    }

    .nav-items {
     display: flex;
    }

    .nav-items a {
    text-decoration: none;
    color: black; /* Ganti warna teks sesuai kebutuhan */
    margin: 0 15px;
    }

      .search-form {
        display: flex;
        align-items: center;
      }

      .search-form form {
        display: flex;
        margin-right: 10px; /* Sesuaikan jarak antara input dan tombol */
      }

      .search-form input {
        padding: 5px;
        width: 200px;
      }

      .search-form button {
        background-color: #4caf50;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
      }

      .logo span {
        margin-right: 10px;
      }

      .banner {
        position: relative;
        width: 100%;
        max-height: 200px; /* Sesuaikan ketinggian banner sesuai kebutuhan */
        overflow: hidden;
      }

      .banner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .banner-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
      }

      .above-gallery-text {
  background-color: #333; /* Ganti warna latar belakang sesuai kebutuhan */
  color: #fff; /* Ganti warna teks sesuai kebutuhan */
  text-align: center;
  font-size: 20px;
  margin-bottom: 10px;
  padding: 10px; /* Sesuaikan ukuran padding sesuai kebutuhan */
}

.gallery {
  display: flex;
  justify-content: center;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  background-color: #f1f1f1; /* Ganti warna latar belakang sesuai kebutuhan */
}

.gallery-item {
  text-align: center;
  margin: 10px;
  padding: 10px;
  background-color: gray; /* Ganti warna latar belakang sesuai kebutuhan */
  border-radius: 5px;
}

.gallery img {
  width: 150px;
  height: 150px;
  margin: 5px;
  border-radius: 5px;
}

.button:hover{
    color: red;
    background-color: cyan;
}

.creator-info {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  margin: 20px;
}

.creator-info img {
  width: 100px; /* Sesuaikan ukuran foto profil sesuai kebutuhan */
  height: 100px; /* Sesuaikan ukuran foto profil sesuai kebutuhan */
  border-radius: 50%; /* Membuat foto profil berbentuk lingkaran */
  margin-bottom: 10px;
}

.creator-text {
  text-align: center;
}

.creator-text p {
  margin: 0;
  font-weight: bold;
}

.footer {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .footer p {
            margin: 0;
        }
      /* Add responsive styles as needed */
      @media screen and (max-width: 768px) {
        .navbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .nav-items {
          margin-top: 10px;
        }
        .gallery {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <div class="logo">
        <span>coblos presiden</span>
      </div>
      <div class="search-form">
        <form
          action="https://www.google.com/search"
          method="GET"
          target="_blank"
        >
          <input type="text" name="q" placeholder="Search..." />
          <button type="submit">Search</button>
        </form>
      </div>
      <div class="nav-items">
        <a href="#creator-info">pembuat</a>
        <a href="#calonpresiden">calon presiden</a>
      </div>
    </div>

    <div class="banner">
      <img src="coblos2.png" alt="Banner Image" />
    </div>

    <div class="above-gallery-text">
      <p>Coblos calon Presiden Indonesia</p>
    </div>

    <div id="calonpresiden" class="gallery">
        <div class="gallery-item">
            <img src="coblos.png" alt="prabowo gibran" />
            <p>PAN</p>
            <button class="button">Pilih lah</button>
        </div>
        <div class="gallery-item">
            <img src="gambar.png" alt="banteng" />
            <p>banteng</p>
            <button class="button">Pilih lah</button>
        </div>
        <div class="gallery-item">
            <img src="nasdem.jpg" alt="nasdem" />
            <p>nasdem</p>
            <button class="button">Pilih lah</button>
        </div>
    </div>

      <div id="creator-info" class="creator-info">
        <img src="profile-picture.jpg" alt="creator-info">
        <div class="creator-text">
          <p>Dibuat oleh:</p>
          <p>veren</p>
        </div>
      </div>
      
      <div class="footer">
        <p>&copy; 2024 coblos-presiden. All Rights Reserved.</p>
    </div>
  </body>
</html>
